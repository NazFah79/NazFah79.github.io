<style>

body{

    background:#f5f7fb;

    padding:25px;

header h1{
    margin:0;

.container{
    max-width:1000px;

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

.card{

    border-radius:10px;

    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    margin-top:0;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

footer{
    text-align:center;
    padding:15px;
    color:#777;
}

</head>
